<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Todo Card - HNG Stage 0</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <main>
            <article data-testid="test-todo-card" aria-label="Todo Task Card">
                
                <!--Title + Priority -->
                <header>
                    <h2 data-testid="test-todo-title">
                        Complete HNG Frontend Task
                    </h2>

                    <span data-testid="test-todo-priority" aria-label="High Priority">
                        🔴 High
                    </span>
                </header>

                <!--Description-->
                <p data-testid="test-todo-description">
                    Build a clean, accesible, and responsive Todo Card component using HTML, CSS AND JavaScript.
                </p>

                <!--Dates-->
                <section>
                    <p>
                        <strong>Deadline:</strong>
                        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00">
                            April 16, 2026 - 6:00 PM
                        </time>
                    </p>

                    <p data-testid="test-todo-time-remaining" aria-live="polite"></p>
                </section>

                <!-- Status + Checkbox-->
                <section>
                    <span data-testid="test-todo-status" aria-label="Task status">
                        Pending
                    </span>

                    <div>
                        <input
                            type="checkbox"
                            id="complete-task"
                            data-testid="test-todo-complete-toggle"
                        />
                        <label for="complete-task">Mark as complete</label>
                    </div>
                </section>

                <!-- Tags -->
                 <section>
                    <h3>Tags</h3>

                    <ul data-testid="test-todo-tags" role="list">
                        <li data-testid="test-todo-tag-work">work</li>
                        <li data-testid="test-todo-tag-urgent">urgent</li>
                        <li data-testid="test-todo-tag-design">design</li>
                    </ul>
                 </section>

                 <!-- Actions-->
                  <footer>
                    <button data-testid="test-todo-edit-button" aria-label="Edit task">
                        🖋 Edit
                    </button>

                    <button data-testid="test-todo-delete-button" aria-label="Delete task">
                        🗑 Delete
                    </button>
                  </footer>

            </article>
        </main>
    <script src="script.js"></script> 
    </body>
</html>
